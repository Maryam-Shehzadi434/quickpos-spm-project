name: CI Pipeline

on:
  push:
    branches: [ main, feature/*, bugfix/*, SCRUM-* ]
  pull_request:
    branches: [ main ]

jobs:
  validate-commits:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    - name: Check commit messages
      run: |
        COMMITS=$(git log --format='%s' origin/main..HEAD 2>/dev/null || git log --format='%s' HEAD~3..HEAD)
        if [ -z "$COMMITS" ]; then
          exit 0
        fi
        while IFS= read -r commit; do
          if [[ ! "$commit" =~ ^\[SCRUM-[0-9]+\] ]]; then
            echo "ERROR: Commit missing [SCRUM-XXX]: $commit"
            exit 1
          fi
        done <<< "$COMMITS"

  code-quality:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
    - uses: actions/checkout@v3
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
    - name: Install Composer
      run: composer install --no-progress --no-interaction
    - name: PHPStan Analysis
      run: vendor/bin/phpstan analyse tests/ --level=5 || true

  tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
    - name: Install Composer
      run: composer install --no-progress --no-interaction
    - name: Run PHPUnit Tests
      run: vendor/bin/phpunit --testdox

  syntax-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Check PHP Syntax
      run: find . -name "*.php" -not -path "./vendor/*" -exec php -l {} \;

  pr-validation:
    runs-on: ubuntu-latest
    needs: [validate-commits, tests, syntax-check]
    if: always()
    steps:
    - name: Check all statuses
      run: |
        if [ "${{ needs.validate-commits.result }}" != "success" ]; then
          echo "validate-commits failed"
          exit 1
        fi
        if [ "${{ needs.tests.result }}" != "success" ]; then
          echo "tests failed"
          exit 1
        fi
        if [ "${{ needs.syntax-check.result }}" != "success" ]; then
          echo "syntax-check failed"
          exit 1
        fi
        echo "All checks passed"